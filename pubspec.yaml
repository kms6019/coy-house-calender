name: coy_house_calender
description: "부부 공유 스마트 캘린더 - CoyHouseCalender"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.1

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 캘린더 UI
  table_calendar: ^3.1.2

  # 라우팅
  go_router: ^14.6.2

  # 로컬 알림
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # 유틸리티
  intl: ^0.20.1
  uuid: ^4.5.1
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
